<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>单摆物理模拟器</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>单摆物理模拟器</h1>
      <p class="subtitle">探索摆长与重力加速度对周期的影响</p>
    </header>

    <main>
      <div class="canvas-wrapper">
        <canvas id="pendulumCanvas" width="600" height="550"></canvas>
      </div>

      <aside class="control-panel">
        <div class="panel-section">
          <h2>参数调节</h2>

          <div class="slider-group">
            <label for="lengthSlider">
              摆长 L: <span id="lengthValue">1.00</span> m
            </label>
            <input
              type="range"
              id="lengthSlider"
              min="0.1"
              max="2.0"
              step="0.01"
              value="1.00"
            >
            <div class="slider-range">
              <span>0.1 m</span>
              <span>2.0 m</span>
            </div>
          </div>

          <div class="slider-group">
            <label for="gravitySlider">
              重力加速度 g: <span id="gravityValue">9.80</span> m/s²
            </label>
            <input
              type="range"
              id="gravitySlider"
              min="1"
              max="20"
              step="0.1"
              value="9.80"
            >
            <div class="slider-range">
              <span>1 m/s² (月球)</span>
              <span>20 m/s² (木星)</span>
            </div>
          </div>

          <div class="info-box">
            <p><strong>初始角度:</strong> 15°（固定）</p>
            <p><strong>物理公式:</strong> θ(t) = θ₀ · cos(√(g/L) · t)</p>
          </div>
        </div>

        <div class="panel-section">
          <h2>实时数据</h2>
          <div class="data-grid">
            <div class="data-item">
              <span class="data-label">当前角度 θ</span>
              <span class="data-value" id="angleValue">0.00°</span>
            </div>
            <div class="data-item">
              <span class="data-label">角速度 ω</span>
              <span class="data-value" id="angVelValue">0.00 rad/s</span>
            </div>
            <div class="data-item">
              <span class="data-label">周期 T</span>
              <span class="data-value highlight" id="periodValue">0.00 s</span>
            </div>
            <div class="data-item">
              <span class="data-label">运行时间</span>
              <span class="data-value" id="elapsedValue">0.00 s</span>
            </div>
          </div>
        </div>

        <div class="panel-section">
          <h2>快捷场景</h2>
          <div class="preset-buttons">
            <button data-l="1" data-g="9.8" class="preset-btn">🌍 地球 (L=1m)</button>
            <button data-l="1" data-g="1.62" class="preset-btn">🌙 月球</button>
            <button data-l="1" data-g="24.79" class="preset-btn">🪐 木星</button>
            <button data-l="0.2" data-g="9.8" class="preset-btn">⏱️ 短摆 (0.2m)</button>
            <button data-l="2" data-g="9.8" class="preset-btn">🔔 长摆 (2m)</button>
          </div>
        </div>
      </aside>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
